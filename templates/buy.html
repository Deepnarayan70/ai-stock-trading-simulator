
{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="glass p-5 animate-fade-in">
      <h2 class="fw-bold mb-4">Execute Purchase</h2>
      <form method="POST">
        <div class="mb-3">
          <label class="stats-label">Stock Symbol</label>
          <input class="form-control" name="symbol" placeholder="e.g. AAPL" required>
        </div>
        <div class="mb-4">
          <label class="stats-label">Investment Amount (USD)</label>
          <input class="form-control" name="amount" type="number" step="0.01" placeholder="0.00" required>
        </div>
        <button class="btn btn-primary w-100 py-3">Confirm Buy</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
