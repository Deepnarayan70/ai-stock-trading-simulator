{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center py-5">
  <div class="col-md-5">
    <div class="glass p-5 animate-fade-in">
      <h2 class="text-center fw-bold mb-4">Welcome Back</h2>
      <form method="POST">
        <div class="mb-3">
          <label class="stats-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
        </div>
        <div class="mb-4">
          <label class="stats-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-3 mb-3">Sign In</button>
        <p class="text-center text-muted small mb-0">
          Don't have an account? <a href="{{ url_for('register') }}" class="text-primary text-decoration-none fw-bold">Create one</a>
        </p>
      </form>
    </div>
  </div>
</div>
{% endblock %}
