{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="glass p-5 animate-fade-in">
      <h2 class="fw-bold mb-4 text-danger">Liquidate Asset</h2>
      <form method="POST">
        <div class="mb-3">
          <label class="stats-label">Stock Symbol</label>
          <input class="form-control" name="symbol" placeholder="e.g. AAPL" required>
        </div>
        <div class="mb-4">
          <label class="stats-label">Shares to Sell</label>
          <input class="form-control" name="shares" type="number" step="any" placeholder="0.00" required>
        </div>
        <button class="btn btn-danger w-100 py-3 fw-bold">Confirm Sale</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
